name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # CI Stage - Validation for PRs
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: |
        npm install -g pnpm
        pnpm install

    - name: Lint backend (ruff)
      working-directory: ./backend
      run: ruff check src/

    - name: Format check backend (black)
      working-directory: ./backend
      run: black --check src/

    - name: Type check backend (mypy)
      working-directory: ./backend
      run: mypy src/
      continue-on-error: true

    - name: Lint frontend (eslint)
      working-directory: ./frontend
      run: pnpm lint
      continue-on-error: true

    - name: Format check frontend (prettier)
      working-directory: ./frontend
      run: pnpm format:check
      continue-on-error: true

    - name: Set up PostgreSQL
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '15'
        postgresql db: iabank_test
        postgresql user: iabank
        postgresql password: iabank_password

    - name: Run backend tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://iabank:iabank_password@localhost:5432/iabank_test
        DEBUG: false
        SECRET_KEY: test-secret-key-for-ci
      run: |
        python manage.py migrate
        pytest --cov=src --cov-report=xml --cov-min=85

    - name: Quality Gates Check
      working-directory: ./backend
      run: |
        echo "🔍 Running Quality Gates validation..."

        # Complexity check (McCabe ≤10)
        echo "Checking complexity with ruff..."
        ruff check --select=C90 src/

        # Coverage check (≥85% - already enforced by pytest above)
        echo "Coverage check passed (enforced by pytest --cov-fail-under=85)"

        # Security check
        echo "Running security checks..."
        pip install pip-audit bandit bandit-sarif-formatter

        # pip-audit check for dependency vulnerabilities (requirements.txt only)
        pip-audit -r requirements.txt

        # Bandit check (fail on high/medium severity issues)
        bandit -r src/ -ll -i

        # Generate SARIF report for GitHub Code Scanning
        bandit -r src/ -f sarif -o security-report.sarif --exit-zero

        echo "✅ All Quality Gates passed!"

    - name: Run frontend tests
      working-directory: ./frontend
      run: pnpm test
      continue-on-error: true

    - name: Build frontend
      working-directory: ./frontend
      run: pnpm build

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
      continue-on-error: true

  # CD Stage - Deploy on main branch success
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/iabank-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/iabank-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

    - name: Deploy notification
      run: |
        echo "Deployment completed for commit ${{ github.sha }}"
        echo "Backend image: ${{ secrets.DOCKER_USERNAME }}/iabank-backend:${{ github.sha }}"
        echo "Frontend image: ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:${{ github.sha }}"

  # Security scanning
  security:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Snyk security scan
      uses: snyk/actions/python@master
      with:
        args: --file=backend/pyproject.toml
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

    - name: Set up Python 3.11 for security scan
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security scan dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: python, javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

    - name: Security vulnerability scan
      working-directory: ./backend
      run: |
        # Safety check for known vulnerabilities
        safety check --json --output security-safety.json || true

        # Bandit security linting
        bandit -r src/ -f json -o security-bandit.json || true

        # Display results (non-blocking for now)
        echo "Safety scan completed"
        echo "Bandit scan completed"

    - name: Upload SARIF results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: backend/security-report.sarif
        category: bandit-security-scan
      if: always()

    - name: Upload security artifacts
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: backend/security-*.json
      if: always()