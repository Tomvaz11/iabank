---
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect changes for conditional jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - 'scripts/**'
              - '.github/workflows/main.yml'
            frontend:
              - 'frontend/**'
              - 'package*.json'
              - '.github/workflows/main.yml'

  # Backend CI (conditional)
  backend-ci:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install

      - name: Lint backend (ruff)
        working-directory: ./backend
        run: ruff check src/

      - name: Format check backend (black)
        working-directory: ./backend
        run: black --check src/

      - name: Type check backend (mypy)
        working-directory: ./backend
        run: mypy src/
        continue-on-error: true

      - name: Set up PostgreSQL
        uses: harmon758/postgresql-action@v1
        with:
          postgresql version: '15'
          postgresql db: iabank_test
          postgresql user: iabank
          postgresql password: iabank_password

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://iabank:iabank_password@localhost:5432/iabank_test
          DEBUG: false
          SECRET_KEY: test-secret-key-for-ci
        run: |
          python manage.py migrate
          pytest --cov=src --cov-report=xml --cov-min=85

      - name: Quality Gates Check
        working-directory: ./backend
        run: |
          echo "🔍 Running Quality Gates validation..."

          # Complexity check (McCabe ≤10)
          echo "Checking complexity with ruff..."
          ruff check --select=C90 src/

          # Coverage check (≥85% - already enforced by pytest above)
          echo "Coverage check passed (enforced by pytest --cov-fail-under=85)"

          # Security check
          echo "Running security checks..."
          pip install pip-audit bandit bandit-sarif-formatter

          # pip-audit check for dependency vulnerabilities
          pip-audit -r requirements.txt

          # Bandit check (fail on high/medium severity issues)
          bandit -r src/ -ll -i

          # Generate SARIF report for GitHub Code Scanning
          bandit -r src/ -f sarif -o security-report.sarif --exit-zero

          echo "✅ All Quality Gates passed!"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # Frontend CI (conditional)
  frontend-ci:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g pnpm
          pnpm install

      - name: Lint frontend (eslint)
        working-directory: ./frontend
        run: pnpm lint
        continue-on-error: true

      - name: Format check frontend (prettier)
        working-directory: ./frontend
        run: pnpm format:check
        continue-on-error: true

      - name: Run frontend tests
        working-directory: ./frontend
        run: pnpm test
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

  # E2E Tests (conditional on successful frontend/backend builds)
  e2e-tests:
    needs: [changes, backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js for E2E
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g pnpm
          pnpm install

      - name: Set up Python for backend
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install

      - name: Set up PostgreSQL for E2E
        uses: harmon758/postgresql-action@v1
        with:
          postgresql version: '15'
          postgresql db: iabank_e2e
          postgresql user: iabank
          postgresql password: iabank_password

      - name: Start services
        run: |
          docker-compose up -d
          sleep 30  # Wait for services

      - name: Run E2E tests
        working-directory: ./frontend
        run: |
          npm install
          npm run e2e

      - name: Upload E2E artifacts on failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots


  # Deploy (conditional on successful CI and E2E tests)
  deploy:
    needs: [backend-ci, frontend-ci, e2e-tests]
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      always() &&
      (needs.backend-ci.result == 'success' ||
       needs.backend-ci.result == 'skipped') &&
      (needs.frontend-ci.result == 'success' ||
       needs.frontend-ci.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' ||
       needs.e2e-tests.result == 'skipped')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build and push backend image
        if: needs.backend-ci.result == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/iabank-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/iabank-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Build and push frontend image
        if: needs.frontend-ci.result == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Deploy Blue-Green Preparation
        run: |
          echo "🔄 Blue-Green deployment preparation"
          echo "Current environment: ${{ github.environment }}"
          echo "Deployment strategy: Blue-Green ready"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Backend changes: ${{ needs.backend-ci.result }}"
          echo "Frontend changes: ${{ needs.frontend-ci.result }}"

          # Placeholder for future Blue-Green implementation
          # This will be expanded when production infrastructure is ready
          echo "✅ Blue-Green deployment preparation completed"

      - name: Deploy notification
        run: |
          echo "Deployment completed for commit ${{ github.sha }}"
          if [ "${{ needs.backend-ci.result }}" == "success" ]; then
            echo "Backend image: ${{ secrets.DOCKER_USERNAME }}/iabank-backend:${{ github.sha }}"
          fi
          if [ "${{ needs.frontend-ci.result }}" == "success" ]; then
            echo "Frontend image: ${{ secrets.DOCKER_USERNAME }}/iabank-frontend:${{ github.sha }}"
          fi

  # Security scanning (conditional)
  security:
    runs-on: ubuntu-latest
    needs: [changes, backend-ci]
    if: >
      needs.changes.outputs.backend == 'true' &&
      needs.backend-ci.result == 'success'
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        with:
          args: --file=backend/pyproject.toml
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Set up Python 3.11 for security scan
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Security vulnerability scan
        working-directory: ./backend
        run: |
          # Safety check for known vulnerabilities
          safety check --json --output security-safety.json || true

          # Bandit security linting
          bandit -r src/ -f json -o security-bandit.json || true

          # Display results (non-blocking for now)
          echo "Safety scan completed"
          echo "Bandit scan completed"

      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/security-report.sarif
          category: bandit-security-scan
        if: always()

      - name: Upload security artifacts
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: backend/security-*.json
        if: always()
