services:
  postgres-primary:
    image: postgres:15
    container_name: postgres-primary
    environment:
      - POSTGRES_DB=iabank
      - POSTGRES_USER=iabank
      - POSTGRES_PASSWORD=iabank_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./backend/scripts/postgres/init-primary.sql:/docker-entrypoint-initdb.d/01-init-primary.sql:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64MB
      -c hot_standby=on
      -c archive_mode=off
      -c listen_addresses='*'
      -c log_replication_commands=on
    networks:
      - dr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iabank -d iabank"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-standby:
    image: postgres:15
    container_name: postgres-standby
    environment:
      - POSTGRES_DB=iabank
      - POSTGRES_USER=iabank
      - POSTGRES_PASSWORD=iabank_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_standby_data:/var/lib/postgresql/data
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Aguardando primary...' &&
      sleep 15 &&
      echo 'Criando backup base...' &&
      rm -rf /var/lib/postgresql/data/* &&
      PGPASSWORD=repl_password pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replicator -v -P -R -X stream &&
      chown -R postgres:postgres /var/lib/postgresql/data &&
      chmod 700 /var/lib/postgresql/data &&
      su postgres -c 'postgres -D /var/lib/postgresql/data'
      "
    networks:
      - dr_network

networks:
  dr_network:
    driver: bridge

volumes:
  postgres_primary_data:
  postgres_standby_data: