# PostgreSQL configuration for Disaster Recovery
# IABANK DR Primary Database Configuration

# Connection and Authentication
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Configuration
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB

# Write-Ahead Logging (WAL) Configuration for Replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 512MB

# Archiving
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/data/pg_wal_archive/%f'

# Replication
hot_standby = on
hot_standby_feedback = on

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'mod'
log_min_duration_statement = 1000

# Performance Monitoring
shared_preload_libraries = 'pg_stat_statements'
track_activities = on
track_counts = on
track_io_timing = on

# Backup and Recovery
checkpoint_completion_target = 0.9
wal_compression = on

# Security
ssl = on
ssl_cert_file = 'server.crt'
ssl_key_file = 'server.key'

# Disaster Recovery Specific
synchronous_commit = on
synchronous_standby_names = 'standby1'

# Timeouts
wal_sender_timeout = 60s
wal_receiver_timeout = 60s