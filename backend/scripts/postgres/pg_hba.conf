# PostgreSQL HBA Configuration for Disaster Recovery
# IABANK DR Authentication Configuration

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            md5

# IPv6 local connections:
host    all             all             ::1/128                 md5

# Docker network connections
host    all             all             172.18.0.0/16           md5
host    all             all             172.19.0.0/16           md5
host    all             all             172.20.0.0/16           md5

# Application connections
host    iabank          iabank          172.18.0.0/16           md5

# Replication connections
host    replication     replicator      172.18.0.0/16           md5
host    replication     replicator      172.19.0.0/16           md5
host    replication     replicator      0.0.0.0/0               md5

# Allow connections from standby server
host    all             all             postgres-standby        md5

# Production network (adjust as needed)
host    all             all             10.0.0.0/8              md5
host    all             all             192.168.0.0/16          md5

# AWS VPC CIDR (adjust based on your AWS setup)
host    all             all             172.31.0.0/16           md5

# Monitoring connections
host    all             postgres        172.20.0.0/16           md5