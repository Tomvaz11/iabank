# PostgreSQL Recovery Configuration for Standby Server
# IABANK DR Standby Database Configuration

# Standby mode
standby_mode = 'on'

# Primary server connection
primary_conninfo = 'host=postgres-primary port=5432 user=replicator password=repl_password application_name=standby1'

# Recovery settings
restore_command = 'cp /var/lib/postgresql/data/pg_wal_archive/%f %p'
archive_cleanup_command = 'pg_archivecleanup /var/lib/postgresql/data/pg_wal_archive %r'

# Streaming replication
primary_slot_name = 'standby_slot'

# Recovery target (for point-in-time recovery)
# recovery_target_time = '2025-09-15 12:00:00'

# Hot standby settings
hot_standby = on
hot_standby_feedback = on

# Timeouts
wal_receiver_timeout = 60s

# Trigger file for promotion
trigger_file = '/var/lib/postgresql/data/promote_trigger'